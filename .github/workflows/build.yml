name: Build Nebula Files

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/org.nebulaprojects.files.yml
          bundle: nebula-files.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: nebula-files-flatpak
          path: nebula-files.flatpak

  appimage:
    name: Build AppImage
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-gi gir1.2-gtk-4.0 gir1.2-adw-1 libgtk-4-1 libadwaita-1-0 desktop-file-utils

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps

          cp src/nebula-files.py AppDir/usr/bin/
          cp src/nebula-files-win11.py AppDir/usr/bin/
          cp src/nebula-files-launcher.py AppDir/usr/bin/
          cp data/org.nebulaprojects.files.desktop AppDir/usr/share/applications/
          cp data/icons/hicolor/scalable/apps/org.nebulaprojects.files.svg AppDir/usr/share/icons/hicolor/scalable/apps/
          cp data/icons/hicolor/scalable/apps/org.nebulaprojects.files.svg AppDir/org.nebulaprojects.files.svg
          cp data/org.nebulaprojects.files.desktop AppDir/org.nebulaprojects.files.desktop

          # Create AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          cd "$APPDIR/usr/bin"
          exec python3 nebula-files-launcher.py "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool AppDir NebulaFiles-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: nebula-files-appimage
          path: NebulaFiles-x86_64.AppImage

  release:
    name: Create Release
    needs: [flatpak, appimage]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nebula-files-flatpak/nebula-files.flatpak
            nebula-files-appimage/NebulaFiles-x86_64.AppImage
          generate_release_notes: true
